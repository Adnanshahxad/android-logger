name: Android Build
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Inject Dropbox Credentials
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          mkdir -p app/src/main/assets
          echo "{\"refresh_token\":\"$DROPBOX_REFRESH_TOKEN\",\"app_key\":\"$DROPBOX_APP_KEY\",\"app_secret\":\"$DROPBOX_APP_SECRET\"}" > app/src/main/assets/dropbox_credentials.json

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK explicitly to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logger-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish Direct APK to Release
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/debug/app-debug.apk"
          tag: "latest"
          name: "Latest Build"
          body: "Direct download for the latest commit."
          allowUpdates: true
          omitBodyDuringUpdate: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
